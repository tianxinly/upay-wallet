name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: windows-latest
            platform: win
            arch: ia32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "mac" ]; then
            npx electron-builder --mac --${{ matrix.arch }} --publish=never
          else
            npx electron-builder --win --${{ matrix.arch }} --publish=never
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: upay-wallet-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/**

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
            release/*.zip
